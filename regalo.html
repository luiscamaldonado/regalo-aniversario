<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Aniversario mi Amor</title>
    <!-- Fuentes elegantes de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #2a0845 0%, #000000 100%);
            font-family: 'Montserrat', sans-serif;
            color: white;
            touch-action: none; /* Previene el scroll en móviles al tocar la pantalla */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 3s ease-in-out;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.7) 100%);
        }
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            margin: 0;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 255, 255, 0.8);
            transform: translateY(-20px);
            padding: 0 20px;
        }
        p {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 10px;
            padding: 0 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #instruction {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            z-index: 3;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
            100% { transform: scale(1); opacity: 0.6; }
        }
        #loading {
            position: absolute;
            top: 50%; width: 100%; text-align: center;
            z-index: 10; font-size: 1.2rem; letter-spacing: 2px;
            color: white;
            transition: opacity 1s;
        }
        
        /* Ajustes responsivos para móviles */
        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            p { font-size: 1rem; }
            #instruction { font-size: 0.9rem; margin-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div id="loading">Preparando tu sorpresa 💖...</div>
    <div id="canvas-container"></div>
    <div id="instruction">Toca la caja para abrirla</div>
    <div id="ui-layer">
        <h1>Feliz Aniversario mi Amor</h1>
        <p>Tú eres el mejor regalo de mi vida.</p>
    </div>

    <!-- Librerías de 3D y Animación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // Referencias del DOM
        const container = document.getElementById('canvas-container');
        const instruction = document.getElementById('instruction');
        const uiLayer = document.getElementById('ui-layer');
        const loading = document.getElementById('loading');

        // ==== SETUP DE ESCENA ====
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x2a0845, 0.015);

        // ==== CÁMARA ====
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 7, 16);

        // ==== RENDERER ====
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // ==== CONTROLES ====
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;
        controls.minDistance = 6;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Limita la cámara arriba del piso
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;

        // ==== ILUMINACIÓN ====
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
        scene.add(ambientLight);

        const mainLight = new THREE.SpotLight(0xffffff, 2.5);
        mainLight.position.set(5, 15, 5);
        mainLight.angle = Math.PI / 6;
        mainLight.penumbra = 0.5;
        mainLight.castShadow = true;
        mainLight.shadow.bias = -0.0001;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0xaa88ff, 1, 20); 
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        // Entorno reflectivo básico simulado
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        pmremGenerator.compileEquirectangularShader();
        scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture; 

        // ==== MATERIALES ====
        const velvetMaterial = new THREE.MeshStandardMaterial({
            color: 0x600000, // Rojo carmesí intenso (terciopelo)
            roughness: 0.9,
            metalness: 0.1,
        });

        const velvetInsideMaterial = new THREE.MeshStandardMaterial({
            color: 0x111111, // Interior oscuro
            roughness: 0.8,
            metalness: 0.2
        });

        const goldMaterial = new THREE.MeshStandardMaterial({
            color: 0xffd700, // Oro
            roughness: 0.15,
            metalness: 1.0,
        });

        const diamondMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 0.9, // Simula cristal/diamante
            opacity: 1,
            metalness: 0,
            roughness: 0,
            ior: 2.4, // Índice de refracción del diamante
            thickness: 1.5,
            specularIntensity: 2.0,
            specularColor: 0xffffff,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });

        // ==== OBJETOS ====
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        // Plano invisible para recibir sombras
        const planeGeo = new THREE.PlaneGeometry(50, 50);
        const planeMat = new THREE.ShadowMaterial({ opacity: 0.4 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = 0; 
        plane.receiveShadow = true;
        scene.add(plane);

        // GRUPO DE LA CAJA
        const boxGroup = new THREE.Group();
        tableGroup.add(boxGroup);

        const boxWidth = 3;
        const boxHeight = 2;
        const boxDepth = 3;

        // Caja Inferior
        const bottomGeo = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);
        const bottomMesh = new THREE.Mesh(bottomGeo, velvetMaterial);
        bottomMesh.position.y = boxHeight / 2;
        bottomMesh.castShadow = true;
        bottomMesh.receiveShadow = true;
        boxGroup.add(bottomMesh);

        // Cojín interior
        const cushionGeo = new THREE.BoxGeometry(boxWidth - 0.4, 0.6, boxDepth - 0.4);
        const cushionMesh = new THREE.Mesh(cushionGeo, velvetInsideMaterial);
        cushionMesh.position.y = boxHeight; 
        boxGroup.add(cushionMesh);
        
        // Hendidura para el anillo
        const slitGeo = new THREE.BoxGeometry(boxWidth - 0.8, 0.61, 0.15);
        const slitMat = new THREE.MeshStandardMaterial({color: 0x000000});
        const slit = new THREE.Mesh(slitGeo, slitMat);
        slit.position.y = boxHeight;
        boxGroup.add(slit);

        // Tapa (Lid)
        const lidGroup = new THREE.Group();
        lidGroup.position.set(0, boxHeight, -boxDepth / 2); // Punto de bisagra trasero
        boxGroup.add(lidGroup);

        const lidGeo = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);
        const lidMesh = new THREE.Mesh(lidGeo, velvetMaterial);
        lidMesh.position.set(0, boxHeight / 2, boxDepth / 2); // Offset basado en bisagra
        lidMesh.castShadow = true;
        lidMesh.receiveShadow = true;
        lidGroup.add(lidMesh);

        // GRUPO DEL ANILLO
        const ringGroup = new THREE.Group();
        ringGroup.position.set(0, boxHeight - 0.3, 0); // Ligeramente escondido en la base
        boxGroup.add(ringGroup);

        const bandRadius = 0.6;
        const tubeRadius = 0.12;
        const bandGeo = new THREE.TorusGeometry(bandRadius, tubeRadius, 32, 100);
        const band = new THREE.Mesh(bandGeo, goldMaterial);
        band.rotation.y = Math.PI / 2;
        band.castShadow = true;
        ringGroup.add(band);

        // Diamante
        const stoneGroup = new THREE.Group();
        stoneGroup.position.y = bandRadius + 0.1; 
        ringGroup.add(stoneGroup);

        const diaBottomGeo = new THREE.ConeGeometry(0.35, 0.4, 16);
        diaBottomGeo.rotateX(Math.PI); 
        const diaBottom = new THREE.Mesh(diaBottomGeo, diamondMaterial);
        diaBottom.position.y = -0.1; 
        diaBottom.castShadow = true;
        stoneGroup.add(diaBottom);

        const diaTopGeo = new THREE.ConeGeometry(0.35, 0.15, 16);
        const diaTop = new THREE.Mesh(diaTopGeo, diamondMaterial);
        diaTop.position.y = 0.175;
        stoneGroup.add(diaTop);

        // Puntas sosteniendo el diamante
        const prongGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 8);
        for(let i=0; i<4; i++) {
            const prong = new THREE.Mesh(prongGeo, goldMaterial);
            const angle = (i * Math.PI) / 2 + Math.PI/4;
            const r = 0.3;
            prong.position.set(Math.cos(angle)*r, 0, Math.sin(angle)*r);
            prong.rotation.x = Math.PI/8 * Math.sin(angle);
            prong.rotation.z = -Math.PI/8 * Math.cos(angle);
            stoneGroup.add(prong);
        }

        // ==== PARTÍCULAS MÁGICAS (Polvo de estrellas) ====
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);
        const scales = new Float32Array(particlesCount);
        for(let i = 0; i < particlesCount * 3; i+=3) {
            posArray[i] = (Math.random() - 0.5) * 30;
            posArray[i+1] = Math.random() * 20;
            posArray[i+2] = (Math.random() - 0.5) * 30;
            scales[i/3] = Math.random();
        }
        
        const particlesGeo = new THREE.BufferGeometry();
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeo.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
        
        const particleShaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0xffd700) }
            },
            vertexShader: `
                uniform float time;
                attribute float aScale;
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    vec4 modelPosition = modelMatrix * vec4(position, 1.0);
                    modelPosition.y += sin(time * 0.5 + modelPosition.x * 2.0) * 0.2;
                    modelPosition.x += cos(time * 0.3 + modelPosition.z * 2.0) * 0.1;
                    vec4 viewPosition = viewMatrix * modelPosition;
                    gl_Position = projectionMatrix * viewPosition;
                    gl_PointSize = (15.0 * aScale) * (1.0 / -viewPosition.z);
                }
            `,
            fragmentShader: `
                uniform vec3 color;
                void main() {
                    float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                    float alpha = 0.05 / distanceToCenter - 0.1;
                    if(alpha < 0.0) discard;
                    gl_FragColor = vec4(color, alpha * 0.6);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particlesMesh = new THREE.Points(particlesGeo, particleShaderMaterial);
        scene.add(particlesMesh);

        // ==== INTERACCIÓN ====
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isOpen = false;

        function onPointerDown(event) {
            if (isOpen) return;

            let clientX, clientY;
            if (event.changedTouches && event.changedTouches.length > 0) {
                clientX = event.changedTouches[0].clientX;
                clientY = event.changedTouches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Verifica si toca cualquier parte de la caja
            const intersects = raycaster.intersectObjects([bottomMesh, lidMesh]);

            if (intersects.length > 0) {
                openBox();
            }
        }

        window.addEventListener('click', onPointerDown);
        window.addEventListener('touchstart', onPointerDown, { passive: false });

        function openBox() {
            isOpen = true;
            controls.autoRotate = false; // Detiene giro automático

            // Vibración en dispositivos que lo soporten
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }

            // Oculta instrucciones
            gsap.to(instruction, { opacity: 0, duration: 0.5, ease: "power1.out" });
            
            // 1. Abrir la caja (rotar la tapa hacia atrás)
            gsap.to(lidGroup.rotation, {
                x: -Math.PI / 1.6, 
                duration: 2.5,
                ease: "power3.inOut"
            });

            // 2. Acercar cámara suavemente
            gsap.to(camera.position, {
                x: 0, y: 5.5, z: 8,
                duration: 3,
                ease: "power2.inOut"
            });
            gsap.to(controls.target, {
                x: 0, y: boxHeight + 1, z: 0,
                duration: 3,
                ease: "power2.inOut"
            });

            // 3. Elevar el anillo
            gsap.to(ringGroup.position, {
                y: boxHeight + 1.2,
                duration: 3,
                delay: 0.5,
                ease: "back.out(1.2)"
            });

            // 4. Rotar el anillo de manera celestial
            gsap.to(ringGroup.rotation, {
                y: Math.PI * 4, 
                duration: 5,
                delay: 0.5,
                ease: "power2.inOut",
                onComplete: () => {
                    // Cicló de giro constante final
                    gsap.to(ringGroup.rotation, {
                        y: "+=" + Math.PI * 2,
                        duration: 10,
                        repeat: -1,
                        ease: "none"
                    });
                }
            });

            // 5. Encender luz brillante dentro de la caja
            const innerLight = new THREE.PointLight(0xffffff, 0, 10);
            innerLight.position.set(0, boxHeight, 0);
            boxGroup.add(innerLight);
            
            gsap.to(innerLight, {
                intensity: 2.5,
                duration: 2,
                delay: 0.5,
                ease: "power2.out"
            });

            // Brillo adicional mágico para el diamente
            diamondMaterial.emissive = new THREE.Color(0xffffff);
            diamondMaterial.emissiveIntensity = 0; 
            gsap.to(diamondMaterial, {
                emissiveIntensity: 0.8, 
                duration: 2,
                delay: 1.5
            });

            // 6. Mostrar el texto de amor con animaciones
            setTimeout(() => {
                uiLayer.style.opacity = 1;
                gsap.from("#ui-layer h1", {
                    y: 30, opacity: 0, duration: 2, ease: "power3.out"
                });
                gsap.from("#ui-layer p", {
                    y: 20, opacity: 0, duration: 2, delay: 0.5, ease: "power3.out"
                });
            }, 3000);
        }

        // Remueve la pantalla de carga tras inicializar (efecto dramático veloz)
        setTimeout(() => {
            loading.style.opacity = 0;
            setTimeout(() => loading.style.display = 'none', 1000);
        }, 800); 

        // ==== CICLO DE ANIMACIÓN ====
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Partículas flotando
            particleShaderMaterial.uniforms.time.value = elapsedTime;
            particlesMesh.rotation.y = elapsedTime * 0.05;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ==== RESPONSIVIDAD ====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
