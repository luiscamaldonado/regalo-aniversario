<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Aniversario mi Amor</title>
    <!-- Fuentes elegantes de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            touch-action: none;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- PANTALLA INICIAL --- */
        #start-screen {
            position: absolute;
            z-index: 50;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0510 0%, #000000 100%);
            cursor: pointer;
            transition: opacity 2s ease-in-out;
        }

        #start-text {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 215, 0, 0.9);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        /* --- GALERÍA DEL ANILLO --- */
        #ring-gallery {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .ring-images {
            position: relative;
            width: 100vw;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -10vh;
            /* Ajuste hacia arriba para dejar espacio al texto */
        }

        .ring-img {
            position: absolute;
            max-width: 90%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 2s ease-in-out, transform 4s ease-out;
            transform: scale(0.95);
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
        }

        .ring-img.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .text-overlay {
            position: absolute;
            bottom: 15%;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            margin: 0;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 255, 255, 0.8), 2px 2px 8px rgba(0, 0, 0, 1);
        }

        p.subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 1);
        }

        .btn-store {
            margin-top: 25px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 30px;
            color: #000;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            opacity: 0;
            pointer-events: none;
            /* Se activa después de unos segundos */
        }

        .btn-store.visible {
            opacity: 1;
            pointer-events: auto;
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* --- PANTALLA DE LA TIENDA (KEVIN'S) --- */
        #store-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2a2a2a 0%, #000000 100%);
            transition: opacity 2s ease-in-out;
        }

        .store-logo {
            width: 80%;
            max-width: 400px;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.2));
            transform: scale(0.8);
            transition: transform 2s ease-out;
        }

        #store-screen.active .store-logo {
            transform: scale(1);
        }

        .store-message {
            font-size: 1.4rem;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 1px;
            padding: 0 30px;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease, transform 2s ease;
            transition-delay: 1s;
        }

        #store-screen.active .store-message {
            opacity: 1;
            transform: translateY(0);
        }

        .store-message span {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.6rem;
            display: block;
            margin-top: 15px;
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            letter-spacing: 2px;
        }

        /* --- EFECTOS EXTRAS --- */
        .sparkle {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="%23fff" opacity="0.5"/></svg>') repeat;
            opacity: 0.1;
            z-index: 100;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.5;
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 3.5rem;
            }

            p.subtitle {
                font-size: 1rem;
            }

            #start-text {
                font-size: 1.2rem;
            }

            .store-message {
                font-size: 1.2rem;
            }

            .store-message span {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Pantalla 1: Inicio -->
        <div id="start-screen" onclick="startExperience()">
            <div id="start-text">Toca para descubrir tu sorpresa</div>
            <div class="sparkle"></div>
        </div>

        <!-- Pantalla 2: Galería del Anillo -->
        <div id="ring-gallery">
            <div class="ring-images">
                <img src="a1.webp" class="ring-img active" alt="Anillo vista 1">
                <img src="a2.webp" class="ring-img" alt="Anillo vista 2">
                <img src="a3.webp" class="ring-img" alt="Anillo vista 3">
                <img src="a4.webp" class="ring-img" alt="Anillo vista 4">
            </div>

            <div class="text-overlay" id="ring-text">
                <h1>Feliz Aniversario mi Amor</h1>
                <p class="subtitle">Hecho a tu medida, con todo mi corazón.</p>
                <button class="btn-store" id="btn-next" onclick="showStore()">¿Dónde está mi anillo?</button>
            </div>
        </div>

        <!-- Pantalla 3: La Tienda Kevin's -->
        <div id="store-screen">
            <img src="kevins.svg" class="store-logo" alt="Kevin's Joyeros">
            <div class="store-message">
                Tu regalo te está esperando en la joyería para que vayas a recogerlo.
                <span>¡Te Amo!</span>
            </div>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const ringGallery = document.getElementById('ring-gallery');
        const storeScreen = document.getElementById('store-screen');
        const ringText = document.getElementById('ring-text');
        const btnNext = document.getElementById('btn-next');
        const images = document.querySelectorAll('.ring-img');

        let currentImageIndex = 0;
        let sliderInterval;

        function startExperience() {
            // Ocultar inicio
            startScreen.style.opacity = '0';
            setTimeout(() => { startScreen.style.display = 'none'; }, 2000);

            // Mostrar Galería
            ringGallery.style.opacity = '1';
            ringGallery.style.pointerEvents = 'auto';

            // Iniciar Crossfade de imágenes
            sliderInterval = setInterval(fadeNextImage, 3500);

            // Mostrar el texto y el botón con un pequeño retraso
            setTimeout(() => {
                ringText.style.opacity = '1';
            }, 1000);

            // Hacer visible el botón después de 5 segundos para que aprecie el anillo
            setTimeout(() => {
                btnNext.classList.add('visible');
            }, 5000);
        }

        function fadeNextImage() {
            // Ocultar imagen actual
            images[currentImageIndex].classList.remove('active');

            // Pasar a la siguiente
            currentImageIndex = (currentImageIndex + 1) % images.length;

            // Mostrar nueva imagen
            images[currentImageIndex].classList.add('active');
        }

        function showStore() {
            // Detener el slider
            clearInterval(sliderInterval);

            // Ocultar galería
            ringGallery.style.opacity = '0';
            ringGallery.style.pointerEvents = 'none';

            // Mostrar tienda Kevin's
            storeScreen.classList.add('active');
            storeScreen.style.opacity = '1';
            storeScreen.style.pointerEvents = 'auto';
        }
    </script>
</body>

</html>
