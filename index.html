<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Aniversario mi Amor</title>
    <!-- Fuentes elegantes de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            touch-action: none;
            /* Previene scroll en móviles */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            perspective: 1000px;
        }

        /* Contenedor de las imágenes para darles algo de movimiento suave */
        .images-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 3s ease-in-out;
        }

        /* Estilos base de las imágenes fotorrealistas */
        .box-image {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            /* Asegura que cubran toda la pantalla como un fondo cinematográfico */
            transition: opacity 2.5s ease-in-out, filter 2.5s ease-in-out, transform 4s ease-out;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 1);
        }

        /* Estado Inicial: Caja Cerrada visible */
        #caja-cerrada {
            z-index: 2;
            opacity: 1;
            transform: scale(1.05);
            /* Ligeramente más grande para que el zoom out se note */
            filter: brightness(0.9);
        }

        /* Estado Inicial: Caja Abierta oculta */
        #caja-abierta {
            z-index: 1;
            opacity: 0;
            transform: scale(1);
            filter: brightness(0.3) blur(10px);
        }

        /* Viñeta oscura en los bordes para mayor efecto cinematográfico */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* === CUANDO EL USUARIO TOCA === */

        /* Acercamiento global de toda la escena */
        .is-open .images-wrapper {
            transform: scale(1.1);
            /* Efecto de acercarse a la caja */
        }

        .is-open #caja-cerrada {
            opacity: 0;
            /* Desaparece suavemente */
            filter: blur(5px);
            pointer-events: none;
        }

        .is-open #caja-abierta {
            opacity: 1;
            /* Aparece la caja abierta brillante */
            filter: brightness(1.1) contrast(1.1) blur(0px);
            /* El anillo resplandece */
            z-index: 3;
        }

        /* Texto de instrucción titilante */
        #instruction {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 1), 0 0 5px rgba(255, 255, 255, 0.5);
            animation: pulse 2.5s infinite ease-in-out;
            pointer-events: none;
            transition: opacity 1s ease, transform 1s ease;
        }

        .is-open #instruction {
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 255, 255, 1);
            }

            100% {
                transform: scale(1);
                opacity: 0.6;
            }
        }

        /* Capa de los textos finales */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 3s ease-in-out;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4) 0%, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5.5rem;
            margin: 0;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 255, 255, 0.8), 2px 2px 8px rgba(0, 0, 0, 1);
            transform: translateY(-20px);
            padding: 0 20px;
        }

        p {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: white;
            margin-top: 15px;
            padding: 0 20px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 1), 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Efecto destello (Lens Flare) */
        .flare {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 60%);
            mix-blend-mode: screen;
            opacity: 0;
            z-index: 4;
            pointer-events: none;
            transition: opacity 2s ease-in-out;
        }

        .is-open .flare {
            animation: flash 4s ease-out forwards;
        }

        @keyframes flash {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            20% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1);
            }

            /* Brillo máximo rápido */
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }

            /* Se desvanece lento */
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 3.8rem;
            }

            p {
                font-size: 1.1rem;
            }

            #instruction {
                font-size: 1rem;
                bottom: 15%;
            }

            .box-image {
                object-position: center bottom;
            }

            /* Alinea mejor el móvil a la caja */
        }

        @media (max-height: 700px) {
            h1 {
                font-size: 3.5rem;
            }

            #instruction {
                bottom: 5%;
            }
        }
    </style>
</head>

<body>
    <div class="container" id="gift-container">

        <div class="images-wrapper">
            <!-- Dos imágenes fotorrealistas solapadas -->
            <img src="caja_cerrada.png" id="caja-cerrada" class="box-image" alt="Misteriosa caja de regalo cerrada">
            <img src="caja_abierta.png" id="caja-abierta" class="box-image"
                alt="Anillo de compromiso diamante brillante">
        </div>

        <div class="vignette"></div>
        <div class="flare"></div>

        <div id="instruction">Toca para descubrir tu sorpresa</div>

        <div id="ui-layer">
            <h1 id="titleText">Feliz Aniversario mi Amor</h1>
            <p id="subText">Tú eres el mejor regalo de mi vida.</p>
        </div>
    </div>

    <!-- Usamos un pequeño script para coordinar la interactividad y los ritmos fluidos -->
    <script>
        const container = document.getElementById('gift-container');
        const instruction = document.getElementById('instruction');
        const uiLayer = document.getElementById('ui-layer');
        const titleText = document.getElementById('titleText');
        const subText = document.getElementById('subText');
        let isOpen = false;

        function revealGift(event) {
            if (!isOpen) {
                isOpen = true;

                // Efecto háptico en móviles (Vibración suave)
                if (navigator.vibrate) {
                    navigator.vibrate([40, 60, 40]);
                }

                // Disparar las animaciones CSS (Transición de imágenes y destellos)
                container.classList.add('is-open');

                // Animar la entrada del texto elegante después del impacto del destello
                setTimeout(() => {
                    uiLayer.style.opacity = '1';

                    // Asegurarnos de que el texto entre suavemente desde abajo
                    titleText.animate([
                        { transform: 'translateY(40px)', opacity: 0 },
                        { transform: 'translateY(-20px)', opacity: 1 }
                    ], { duration: 2500, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)', fill: 'forwards' });

                    subText.animate([
                        { transform: 'translateY(30px)', opacity: 0 },
                        { transform: 'translateY(0)', opacity: 1 }
                    ], { duration: 2500, delay: 600, easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)', fill: 'forwards' });

                }, 1800); // 1.8 segundos de retraso para el texto
            }
        }

        // Soportar tanto clicks (ratón) como toques en pantalla
        container.addEventListener('click', revealGift);
        container.addEventListener('touchstart', revealGift, { passive: true });
    </script>
</body>

</html>
