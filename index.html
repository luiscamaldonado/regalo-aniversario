<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Aniversario mi Amor</title>
    <!-- Fuentes elegantes de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            touch-action: none;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            cursor: pointer;
        }

        /* --- FONDOS DE CAJA FOTORREALISTA --- */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 2s ease-in-out, transform 4s ease-out, filter 2s ease;
        }

        #caja-cerrada {
            z-index: 2;
            opacity: 1;
            transform: scale(1.02);
            filter: brightness(0.9);
        }

        /* Contenedor de la caja abierta para alinear el anillo */
        .open-box-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transform: scale(1);
            filter: brightness(0.8);
            transition: opacity 2s ease-in-out, transform 4s ease-out, filter 2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #caja-abierta {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* ANILLO REAL INTEGRADO EN LA CAJA */
        #real-ring {
            position: absolute;
            z-index: 2;
            /* Estos valores asumen que el slot de la caja 8k originada está por el centro, un poco abajo */
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            max-width: 40%;
            max-height: 40%;
            object-fit: contain;
            filter: drop-shadow(0 20px 15px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 30px rgba(255, 215, 0, 0.4));
            transition: transform 4s ease-out;
            pointer-events: none;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.85) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* --- TEXTO DE INICIO --- */
        #start-text {
            position: absolute;
            bottom: 12%;
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 1);
            animation: pulse 2.5s infinite ease-in-out;
            transition: opacity 1s;
        }

        /* --- ESTADOS AL ABRIR LA CAJA --- */
        .is-open #caja-cerrada {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .is-open .open-box-container {
            opacity: 1;
            transform: scale(1.05);
            /* Efecto de acercamiento al interior */
            filter: brightness(1.2);
            /* Brillo al abrir */
            z-index: 3;
        }

        /* Pequeña animación de levitación para el anillo integrado */
        .is-open #real-ring {
            animation: ringFloat 4s ease-in-out infinite alternate;
        }

        .is-open #start-text {
            opacity: 0;
            pointer-events: none;
        }

        /* --- DESTELLO MÁGICO --- */
        .flare {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 50%);
            mix-blend-mode: screen;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }

        .is-open .flare {
            animation: flash 3s ease-out forwards;
        }

        /* --- TEXTOS ELEGANTES FINALES --- */
        .text-overlay {
            position: absolute;
            bottom: 10%;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease-in-out;
            transition-delay: 1.5s;
        }

        .is-open .text-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            margin: 0;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 255, 255, 0.8), 2px 2px 8px rgba(0, 0, 0, 1);
        }

        p.subtitle {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 1);
        }

        .btn-store {
            margin-top: 25px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ffd700, #ffba00);
            border: none;
            border-radius: 30px;
            color: #000;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(255, 215, 0, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .btn-store.visible {
            opacity: 1;
            pointer-events: auto;
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* --- PANTALLA DE LA TIENDA (KEVIN'S) --- */
        #store-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            transition: opacity 2s ease-in-out;
        }

        .store-logo {
            width: 80%;
            max-width: 400px;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.3));
            transform: scale(0.8);
            transition: transform 2s ease-out;
        }

        #store-screen.active .store-logo {
            transform: scale(1);
        }

        .store-message {
            font-size: 1.4rem;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 1px;
            padding: 0 30px;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease, transform 2s ease;
            transition-delay: 1s;
            text-align: center;
        }

        #store-screen.active .store-message {
            opacity: 1;
            transform: translateY(0);
        }

        .store-message span {
            color: #ffd700;
            display: block;
            margin-top: 15px;
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* --- ANIMACIONES GLOBALES --- */
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 255, 255, 1);
            }

            100% {
                transform: scale(1);
                opacity: 0.6;
            }
        }

        @keyframes ringFloat {
            0% {
                transform: translate(-50%, -50%) scale(0.65) translateY(0px);
            }

            100% {
                transform: translate(-50%, -50%) scale(0.65) translateY(-10px);
            }
        }

        @keyframes flash {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            20% {
                opacity: 0.9;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 3.5rem;
            }

            p.subtitle {
                font-size: 1.1rem;
            }

            #start-text {
                font-size: 1rem;
                bottom: 8%;
            }

            .store-message {
                font-size: 1.2rem;
            }

            .store-message span {
                font-size: 2.8rem;
            }

            .text-overlay {
                bottom: 8%;
            }

            /* Ajustar centrado del anillo en móviles */
            #real-ring {
                top: 50%;
                transform: translate(-50%, -50%) scale(0.8);
            }

            @keyframes ringFloat {
                0% {
                    transform: translate(-50%, -50%) scale(0.8) translateY(0px);
                }

                100% {
                    transform: translate(-50%, -50%) scale(0.8) translateY(-10px);
                }
            }
        }
    </style>
</head>

<body>
    <div class="container" id="main-container" onclick="openBox()">
        <!-- Fondo Fotorealista -->
        <div class="bg-layer">
            <img src="caja_cerrada.png" id="caja-cerrada" class="bg-img" alt="Caja cerrada">

            <div class="open-box-container">
                <img src="caja_abierta.png" id="caja-abierta" alt="Interior caja">
                <!-- Tu anillo real integrado EXACTAMENTE DENTRO DE LA CAJA -->
                <img src="a4.webp" id="real-ring" alt="Tu anillo real">
            </div>

            <div class="vignette"></div>
            <div class="flare"></div>
        </div>

        <!-- Texto Inicial -->
        <div id="start-text">Toca para abrir tu regalo</div>

        <!-- Textos Elegantes sobre la caja -->
        <div class="text-overlay">
            <h1>Feliz Aniversario mi Amor</h1>
            <p class="subtitle">Hecho a tu medida, con todo mi corazón.</p>
            <button class="btn-store" id="btn-next" onclick="showStore(event)">¿Dónde está mi anillo?</button>
        </div>

        <!-- Pantalla Final Tienda -->
        <div id="store-screen">
            <img src="kevins.svg" class="store-logo" alt="Kevin's Joyeros">
            <div class="store-message">
                Tu regalo te está esperando en la joyería para que lo recojas.
                <span>¡Te Amo!</span>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('main-container');
        const storeScreen = document.getElementById('store-screen');
        const btnNext = document.getElementById('btn-next');

        let isOpen = false;

        function openBox() {
            if (!isOpen) {
                isOpen = true;

                // Efecto de vibración inicial
                if (navigator.vibrate) navigator.vibrate([40, 60, 40]);

                // Activar animaciones de caja fotorrealista y mostrar anillo A4
                container.classList.add('is-open');

                // Mostrar el botón de la cita a la joyería después de que aprecien el anillo (5 segundos)
                setTimeout(() => {
                    btnNext.classList.add('visible');
                }, 5000);
            }
        }

        function showStore(event) {
            // Evitar que el click se propague al contenedor principal
            event.stopPropagation();

            // Ocultar la capa de la caja y anillos
            document.querySelector('.text-overlay').style.opacity = '0';
            document.querySelector('.bg-layer').style.opacity = '0'; // Fundir a negro

            // Mostrar la tienda Kevin's
            storeScreen.classList.add('active');
            storeScreen.style.opacity = '1';
            storeScreen.style.pointerEvents = 'auto';
        }
    </script>
</body>

</html>
